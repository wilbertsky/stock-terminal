<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a2332"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
    <linearGradient id="line-grad" x1="0%" y1="100%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.7"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <!-- Subtle chart grid lines -->
  <line x1="60" y1="152" x2="452" y2="152" stroke="#1e2d3d" stroke-width="1.5"/>
  <line x1="60" y1="248" x2="452" y2="248" stroke="#1e2d3d" stroke-width="1.5"/>
  <line x1="60" y1="344" x2="452" y2="344" stroke="#1e2d3d" stroke-width="1.5"/>

  <!-- Lucide TrendingUp icon paths scaled from 24x24 -->
  <g transform="translate(28, 28) scale(19.0)"
     stroke="url(#line-grad)"
     stroke-width="1.6"
     stroke-linecap="round"
     stroke-linejoin="round"
     fill="none"
     filter="url(#glow)">
    <path d="M16 7h6v6"/>
    <path d="M22 7l-8.5 8.5-5-5L2 17"/>
  </g>
</svg>
